<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理者画面 - 経費・出張報告</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F8FA;--surface:#fff;--s2:#F0F2F5;--bdr:#E2E5EA;--bdr2:#D0D5DD;--acc:#3B82F6;--acc2:#1D4ED8;--tx:#1E293B;--tx2:#64748B;--tx3:#94A3B8;--in:#059669;--out:#DC2626;--warn:#F59E0B;--lv:#7C3AED;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.lcard{background:var(--surface);border:1px solid var(--bdr);border-radius:20px;padding:40px 32px;width:100%;max-width:360px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.llogo{font-family:"DM Mono",monospace;font-size:13px;color:var(--acc);letter-spacing:4px;text-transform:uppercase;margin-bottom:16px;}
.lbadge{display:inline-block;background:#EFF6FF;color:var(--acc);border:1px solid #BFDBFE;border-radius:100px;padding:4px 16px;font-size:12px;font-weight:600;margin-bottom:24px;}
.ltitle{font-size:22px;font-weight:700;margin-bottom:8px;}
.lsub{font-size:13px;color:var(--tx3);margin-bottom:32px;}
.lfield{margin-bottom:16px;text-align:left;}
.lfield label{display:block;font-size:11px;color:var(--tx2);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.lfield input{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:8px;padding:12px 14px;color:var(--tx);font-size:15px;outline:none;}
.lfield input:focus{border-color:var(--acc);}
.lerr{font-size:12px;color:var(--out);margin-top:10px;min-height:16px;}
.lbtn{width:100%;padding:14px;background:var(--acc);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
#appScreen{display:none;}
.wrap{max-width:960px;margin:0 auto;padding:24px 16px 60px;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--bdr);}
.hlogo{font-family:"DM Mono",monospace;font-size:13px;color:var(--acc);letter-spacing:3px;text-transform:uppercase;font-weight:500;}
.htitle{font-size:20px;font-weight:700;}
.obtn{font-size:11px;color:var(--tx3);background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:4px 10px;cursor:pointer;}
.tab-nav{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--bdr);}
.tab-btn{padding:10px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--tx2);font-size:14px;cursor:pointer;font-weight:500;margin-bottom:-1px;}
.tab-btn.active{color:var(--acc);border-bottom-color:var(--acc);}
.tab-content{display:none;}
.tab-content.active{display:block;}
.card{background:var(--surface);border:1px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-name{font-size:16px;font-weight:700;}
.card-meta{font-size:12px;color:var(--tx2);margin-top:2px;}
.status-badge{display:inline-block;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;}
.s-draft{background:#F1F5F9;color:var(--tx2);border:1px solid var(--bdr);}
.s-pending{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A;}
.s-approved{background:#ECFDF5;color:var(--in);border:1px solid #A7F3D0;}
.s-rejected{background:#FEF2F2;color:var(--out);border:1px solid #FECACA;}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px;}
.item-row:last-child{border-bottom:none;}
.item-date{font-family:"DM Mono",monospace;font-size:12px;color:var(--tx3);min-width:50px;}
.item-amount{font-family:"DM Mono",monospace;font-size:13px;color:var(--out);font-weight:600;}
.total-row{background:#EFF6FF;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;margin-top:12px;}
.total-amount{font-family:"DM Mono",monospace;font-size:20px;color:var(--acc);font-weight:700;}
.action-btns{display:flex;gap:8px;margin-top:16px;}
.rbtn{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.rbtn-approve{background:#ECFDF5;color:var(--in);border:1.5px solid #A7F3D0;}
.rbtn-reject{background:#FEF2F2;color:var(--out);border:1.5px solid #FECACA;}
.no-data{text-align:center;padding:40px;color:var(--tx3);font-size:13px;}
.twrap{background:var(--surface);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;}
.ltable{width:100%;border-collapse:collapse;}
.ltable th{font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--bdr);background:var(--s2);font-weight:600;}
.ltable td{padding:9px 12px;font-size:12px;color:var(--tx2);border-bottom:1px solid var(--bdr);}
.ltable tr:last-child td{border-bottom:none;}
.section-title{font-size:11px;color:var(--tx3);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin:16px 0 8px;}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.info-item{background:var(--s2);border-radius:8px;padding:10px 12px;}
.info-label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;font-weight:600;}
.info-val{font-size:13px;color:var(--tx);font-weight:500;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;padding:28px;width:100%;max-width:700px;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
.mfield{margin-bottom:12px;}
.mfield label{display:block;font-size:11px;color:var(--tx2);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.mfield textarea{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:8px;padding:11px 14px;color:var(--tx);font-size:14px;outline:none;resize:vertical;min-height:80px;font-family:inherit;}
.mbtns{display:flex;gap:10px;margin-top:20px;}
.mbtn2{flex:1;padding:13px;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;}
.mb-cancel{background:var(--s2);color:var(--tx2);border:1px solid var(--bdr);}
.mb-approve{background:var(--in);color:#fff;}
.mb-reject{background:var(--out);color:#fff;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--tx);color:#fff;padding:11px 24px;border-radius:100px;font-size:13px;transition:transform 0.3s;z-index:300;white-space:nowrap;font-weight:500;}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:600px){.info-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lcard">
    <div class="llogo">DUBSTOCK</div>
    <div class="lbadge">管理者画面</div>
    <div class="ltitle">谷口 管理者</div>
    <div class="lsub">経費・出張報告 管理画面</div>
    <div class="lfield"><label>メールアドレス</label><input type="email" id="adminEmail" placeholder="admin@email.com"></div>
    <div class="lfield"><label>パスワード</label><input type="password" id="adminPass" placeholder="password"></div>
    <div class="lerr" id="adminErr"></div>
    <button class="lbtn" id="adminLoginBtn">ログイン</button>
  </div>
</div>

<div id="appScreen">
<div class="wrap">
  <header>
    <div><div class="hlogo">DUBSTOCK</div><div class="htitle">経費・出張報告 管理</div></div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="pendingBadge"></span>
      <button class="obtn" id="adminLogoutBtn">ログアウト</button>
    </div>
  </header>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="expense">&#x1F4B0; 経費精算</button>
    <button class="tab-btn" data-tab="travel">&#x2708;&#xFE0F; 出張報告</button>
  </div>

  <div class="tab-content active" id="tab-expense">
    <div id="expAdminList"><div class="no-data">読み込み中...</div></div>
  </div>

  <div class="tab-content" id="tab-travel">
    <div id="travelAdminList"><div class="no-data">読み込み中...</div></div>
  </div>
</div>
</div>

<!-- 詳細モーダル（経費・出張共用） -->
<div class="overlay" id="detailModal">
  <div class="modal">
    <div class="modal-title">
      <span id="detailTitle"></span>
      <button style="background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--tx3);" id="detailCloseBtn">&times;</button>
    </div>
    <div id="detailBody"></div>
    <div class="mfield" id="commentField" style="display:none;">
      <label>コメント（差し戻し時に申請者に通知）</label>
      <textarea id="detailComment" placeholder="例：領収書の添付が必要です"></textarea>
    </div>
    <div class="mbtns" id="detailBtns"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {getFirestore,doc,collection,getDocs,updateDoc} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyBOugWhkAkv5xvbV9bhXvAd-NdVpOIzv7k",authDomain:"kintai-dubstock.firebaseapp.com",projectId:"kintai-dubstock",storageBucket:"kintai-dubstock.firebasestorage.app",messagingSenderId:"1030065146975",appId:"1:1030065146975:web:cc5f4fcbb17402ed9cdfea"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

const EMPLOYEES=[{uid:"yuuki_kenta",name:"結城 健太"}];
const statusMap={draft:"<span class='status-badge s-draft'>下書き</span>",pending:"<span class='status-badge s-pending'>提出済</span>",approved:"<span class='status-badge s-approved'>承認済</span>",rejected:"<span class='status-badge s-rejected'>差し戻し</span>"};

function p2(n){return String(n).padStart(2,"0");}
function fmtYen(n){return "¥ "+Number(n||0).toLocaleString();}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}

async function getAllDocs(col){
  const sn=await getDocs(collection(db,col));
  const r=[];sn.forEach(d=>r.push({id:d.id,...d.data()}));
  return r;
}

// ══ 経費精算 管理 ══
async function renderExpAdmin(){
  const all=await getAllDocs("expenses");
  // グループ：ユーザー×年月
  const groups={};
  all.forEach(e=>{
    if(!e.date)return;
    const key=e.userId+"_"+e.date.slice(0,7);
    if(!groups[key])groups[key]={userId:e.userId,userName:e.userName||e.userId,month:e.date.slice(0,7),items:[],submitted:false};
    groups[key].items.push(e);
    if(e.submitted)groups[key].submitted=true;
    if(e.approved)groups[key].approved=true;
    if(e.rejected)groups[key].rejected=true;
  });
  const el=document.getElementById("expAdminList");
  const sorted=Object.values(groups).sort((a,b)=>b.month.localeCompare(a.month));
  if(!sorted.length){el.innerHTML="<div class='no-data'>経費精算データがありません</div>";return;}
  el.innerHTML="";
  sorted.forEach(g=>{
    const total=g.items.reduce((s,e)=>s+(Number(e.amount)||0),0);
    const status=g.approved?"approved":g.rejected?"rejected":g.submitted?"pending":"draft";
    const div=document.createElement("div");div.className="card";
    div.innerHTML=
      "<div class='card-header'>"+
      "<div><div class='card-name'>"+g.userName+"　<span style='font-family:"DM Mono",monospace;font-size:13px;color:var(--tx2);'>"+g.month+"</span></div>"+
      "<div class='card-meta'>"+g.items.length+"件</div></div>"+
      (statusMap[status]||"")+
      "</div>"+
      g.items.map(e=>"<div class='item-row'><span class='item-date'>"+e.date.slice(5)+"</span><span style='flex:1;padding:0 8px;'>"+e.desc+"</span><span style='font-size:11px;color:var(--tx3);padding:0 8px;'>"+e.method+"</span><span class='item-amount'>"+fmtYen(e.amount)+"</span></div>").join("")+
      "<div class='total-row'><span style='font-weight:600;color:var(--acc2);'>合計</span><span class='total-amount'>"+fmtYen(total)+"</span></div>"+
      (status==="pending"?"<div class='action-btns'><button class='rbtn rbtn-approve'>&#x2705; 承認する</button><button class='rbtn rbtn-reject'>&#x274C; 差し戻す</button></div>":"");
    if(status==="pending"){
      div.querySelector(".rbtn-approve").addEventListener("click",async()=>{
        if(!confirm("承認しますか？"))return;
        for(const item of g.items){await updateDoc(doc(db,"expenses",item.id),{approved:true,approvedAt:new Date().toISOString()});}
        showToast("承認しました ✓");renderExpAdmin();
      });
      div.querySelector(".rbtn-reject").addEventListener("click",()=>{
        openDetailModal("exp_reject",g,null);
      });
    }
    el.appendChild(div);
  });
}

// ══ 出張報告 管理 ══
async function renderTravelAdmin(){
  const all=await getAllDocs("travels");
  all.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  const el=document.getElementById("travelAdminList");
  if(!all.length){el.innerHTML="<div class='no-data'>出張報告データがありません</div>";return;}
  el.innerHTML="";
  all.forEach(t=>{
    if(t.status==="draft")return;
    const totalCost=(t.costs||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
    const div=document.createElement("div");div.className="card";
    div.style.cursor="pointer";
    div.innerHTML=
      "<div class='card-header'>"+
      "<div><div class='card-name'>"+( t.userName||t.userId)+"　"+t.dest+"出張</div>"+
      "<div class='card-meta'>"+( t.from||"")+(t.to&&t.to!==t.from?" 〜 "+t.to:"")+" / 目的："+( t.purpose||"")+"</div></div>"+
      (statusMap[t.status]||"")+
      "</div>"+
      "<div class='info-grid'>"+
      "<div class='info-item'><div class='info-label'>交通手段</div><div class='info-val'>"+( t.transport||"―")+"</div></div>"+
      "<div class='info-item'><div class='info-label'>同行者</div><div class='info-val'>"+( t.companion||"―")+"</div></div>"+
      "<div class='info-item'><div class='info-label'>交通費・宿泊費</div><div class='info-val' style='color:var(--out);font-weight:700;'>"+fmtYen(totalCost)+"</div></div>"+
      "</div>"+
      (t.status==="pending"?"<div class='action-btns'><button class='rbtn rbtn-approve'>&#x2705; 承認する</button><button class='rbtn rbtn-reject'>&#x274C; 差し戻す</button></div>":"");
    if(t.status==="pending"){
      div.querySelector(".rbtn-approve").addEventListener("click",async e=>{
        e.stopPropagation();
        if(!confirm("承認しますか？"))return;
        await updateDoc(doc(db,"travels",t.id),{status:"approved",approvedAt:new Date().toISOString()});
        showToast("承認しました ✓");renderTravelAdmin();
      });
      div.querySelector(".rbtn-reject").addEventListener("click",e=>{
        e.stopPropagation();
        openDetailModal("travel_reject",null,t);
      });
    }
    div.addEventListener("click",()=>openDetailModal("travel_view",null,t));
    el.appendChild(div);
  });
}

// 詳細モーダル
let modalMode=null,modalGroup=null,modalTravel=null;
function openDetailModal(mode,group,travel){
  modalMode=mode;modalGroup=group;modalTravel=travel;
  const body=document.getElementById("detailBody");
  const commentField=document.getElementById("commentField");
  const btns=document.getElementById("detailBtns");
  document.getElementById("detailComment").value="";
  commentField.style.display="none";
  btns.innerHTML="";

  if(mode==="exp_reject"){
    document.getElementById("detailTitle").textContent="経費精算 差し戻し";
    body.innerHTML="<div style='font-size:13px;color:var(--tx2);margin-bottom:12px;'>"+group.userName+" / "+group.month+" / 合計 "+fmtYen(group.items.reduce((s,e)=>s+(Number(e.amount)||0),0))+"</div>";
    commentField.style.display="block";
    btns.innerHTML="<button class='mbtn2 mb-cancel' id='detailCancelBtn'>キャンセル</button><button class='mbtn2 mb-reject' id='detailActionBtn'>差し戻す</button>";
  } else if(mode==="travel_reject"){
    document.getElementById("detailTitle").textContent="出張報告 差し戻し";
    body.innerHTML="<div style='font-size:13px;color:var(--tx2);margin-bottom:12px;'>"+travel.dest+"出張（"+( travel.from||"")+"）</div>";
    commentField.style.display="block";
    btns.innerHTML="<button class='mbtn2 mb-cancel' id='detailCancelBtn'>キャンセル</button><button class='mbtn2 mb-reject' id='detailActionBtn'>差し戻す</button>";
  } else if(mode==="travel_view"){
    document.getElementById("detailTitle").textContent=travel.dest+"出張 - 詳細";
    const totalCost=(travel.costs||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
    body.innerHTML=
      "<div class='section-title'>基本情報</div>"+
      "<div class='info-grid' style='grid-template-columns:repeat(2,1fr);'>"+
      "<div class='info-item'><div class='info-label'>出張先</div><div class='info-val'>"+( travel.dest||"―")+"</div></div>"+
      "<div class='info-item'><div class='info-label'>目的</div><div class='info-val'>"+( travel.purpose||"―")+"</div></div>"+
      "<div class='info-item'><div class='info-label'>期間</div><div class='info-val'>"+( travel.from||"")+" 〜 "+( travel.to||"")+"</div></div>"+
      "<div class='info-item'><div class='info-label'>交通手段</div><div class='info-val'>"+( travel.transport||"―")+"</div></div>"+
      "</div>"+
      "<div class='section-title'>出張内容</div>"+
      "<div class='twrap' style='margin-bottom:12px;'><table class='ltable'><thead><tr><th>日付</th><th>時間</th><th>訪問先</th><th>内容</th><th>対応者</th><th>結果</th></tr></thead><tbody>"+
      (travel.schedules||[]).map(s=>"<tr><td>"+( s.date||"")+"</td><td>"+( s.time||"")+"</td><td>"+( s.place||"")+"</td><td>"+( s.content||"")+"</td><td>"+( s.contact||"")+"</td><td>"+( s.result||"")+"</td></tr>").join("")+
      "</tbody></table></div>"+
      "<div class='section-title'>交通費・宿泊費</div>"+
      "<div class='twrap' style='margin-bottom:12px;'><table class='ltable'><thead><tr><th>日付</th><th>区間・内容</th><th>交通手段</th><th>領収書</th><th>金額</th><th>備考</th></tr></thead><tbody>"+
      (travel.costs||[]).map(c=>"<tr><td>"+( c.date||"")+"</td><td>"+( c.route||"")+"</td><td>"+( c.transport||"")+"</td><td>"+(c.receipt?"有":"―")+"</td><td style='color:var(--out);font-weight:600;font-family:"DM Mono",monospace;'>"+fmtYen(c.amount)+"</td><td>"+( c.note||"")+"</td></tr>").join("")+
      "</tbody></table></div>"+
      "<div style='background:#ECFDF5;border:1px solid #A7F3D0;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;margin-bottom:12px;'><span style='font-weight:600;color:var(--in);'>合計</span><span style='font-family:"DM Mono",monospace;font-size:18px;color:var(--in);font-weight:700;'>"+fmtYen(totalCost)+"</span></div>"+
      (travel.report?"<div class='section-title'>所見・報告事項</div><div style='background:var(--s2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--tx);line-height:1.8;'>"+travel.report+"</div>":"");
    btns.innerHTML="<button class='mbtn2 mb-cancel' id='detailCancelBtn'>閉じる</button>";
  }

  document.getElementById("detailModal").classList.add("open");
  document.getElementById("detailCancelBtn").addEventListener("click",closeDetailModal);
  const actionBtn=document.getElementById("detailActionBtn");
  if(actionBtn){
    actionBtn.addEventListener("click",async()=>{
      const comment=document.getElementById("detailComment").value.trim();
      if(mode==="exp_reject"){
        for(const item of group.items){await updateDoc(doc(db,"expenses",item.id),{rejected:true,rejectedAt:new Date().toISOString(),comment});}
        showToast("差し戻しました");closeDetailModal();renderExpAdmin();
      } else if(mode==="travel_reject"){
        await updateDoc(doc(db,"travels",travel.id),{status:"rejected",rejectedAt:new Date().toISOString(),comment});
        showToast("差し戻しました");closeDetailModal();renderTravelAdmin();
      }
    });
  }
}
function closeDetailModal(){document.getElementById("detailModal").classList.remove("open");}

function showTab(name){
  document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(e=>e.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  document.querySelector("[data-tab="+name+"]").classList.add("active");
  if(name==="expense")renderExpAdmin();
  if(name==="travel")renderTravelAdmin();
}

onAuthStateChanged(auth,async user=>{
  if(!user){document.getElementById("loginScreen").style.display="flex";document.getElementById("appScreen").style.display="none";return;}
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("appScreen").style.display="block";
  if(window._adminInitialized2)return;
  window._adminInitialized2=true;
  document.querySelectorAll(".tab-btn").forEach(btn=>{btn.addEventListener("click",()=>showTab(btn.dataset.tab));});
  document.getElementById("adminLogoutBtn").addEventListener("click",()=>signOut(auth));
  document.getElementById("detailCloseBtn").addEventListener("click",closeDetailModal);
  document.getElementById("detailModal").addEventListener("click",e=>{if(e.target===e.currentTarget)closeDetailModal();});
  await renderExpAdmin();
  setInterval(()=>{renderExpAdmin();renderTravelAdmin();},30000);
});

document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("adminLoginBtn").addEventListener("click",async function(){
    const em=document.getElementById("adminEmail").value.trim();
    const pw=document.getElementById("adminPass").value;
    const er=document.getElementById("adminErr");er.textContent="";
    if(!em||!pw){er.textContent="メールアドレスとパスワードを入力してください";return;}
    try{await signInWithEmailAndPassword(auth,em,pw);}
    catch(e){er.textContent="ログインに失敗しました。内容を確認してください。";}
  });
  document.getElementById("adminPass").addEventListener("keydown",function(e){
    if(e.key==="Enter")document.getElementById("adminLoginBtn").click();
  });
});
</script>
</body>
</html>
